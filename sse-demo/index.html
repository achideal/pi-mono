<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>SSE Demo</title>
		<style>
			:root {
				color-scheme: light;
				--bg: #f5efe4;
				--panel: rgba(255, 252, 245, 0.9);
				--panel-border: rgba(36, 42, 68, 0.16);
				--ink: #182033;
				--muted: #4f5a78;
				--accent: #bf4f28;
				--accent-soft: rgba(191, 79, 40, 0.12);
				--ok: #1f7a53;
				--warn: #a26a00;
				--shadow: 0 24px 60px rgba(25, 32, 51, 0.14);
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
				background:
					radial-gradient(circle at top left, rgba(191, 79, 40, 0.2), transparent 30%),
					radial-gradient(circle at top right, rgba(31, 122, 83, 0.18), transparent 28%),
					linear-gradient(180deg, #fffaf2 0%, var(--bg) 100%);
				color: var(--ink);
			}

			main {
				width: min(980px, calc(100vw - 32px));
				margin: 40px auto;
				display: grid;
				gap: 20px;
			}

			.hero,
			.output {
				background: var(--panel);
				border: 1px solid var(--panel-border);
				border-radius: 24px;
				box-shadow: var(--shadow);
				backdrop-filter: blur(10px);
			}

			.hero {
				padding: 24px;
				display: grid;
				gap: 16px;
			}

			.label {
				display: inline-flex;
				align-items: center;
				gap: 10px;
				padding: 8px 12px;
				width: fit-content;
				border-radius: 999px;
				background: var(--accent-soft);
				color: var(--accent);
				font-size: 13px;
				font-weight: 700;
				letter-spacing: 0.08em;
				text-transform: uppercase;
			}

			.dot {
				width: 10px;
				height: 10px;
				border-radius: 999px;
				background: currentColor;
				box-shadow: 0 0 0 6px color-mix(in srgb, currentColor 18%, transparent);
				animation: pulse 1.6s infinite ease-out;
			}

			h1 {
				margin: 0;
				font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
				font-size: clamp(34px, 6vw, 64px);
				line-height: 0.94;
				letter-spacing: -0.04em;
			}

			p {
				margin: 0;
				max-width: 70ch;
				color: var(--muted);
				line-height: 1.65;
			}

			.meta {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
				gap: 12px;
			}

			.card {
				padding: 14px 16px;
				border-radius: 18px;
				background: rgba(255, 255, 255, 0.65);
				border: 1px solid rgba(36, 42, 68, 0.1);
			}

			.card span {
				display: block;
			}

			.card .name {
				margin-bottom: 6px;
				font-size: 12px;
				font-weight: 700;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--muted);
			}

			.card .value {
				font-size: 20px;
				font-weight: 700;
			}

			.output {
				padding: 24px;
			}

			pre {
				margin: 0;
				min-height: 320px;
				padding: 20px;
				border-radius: 20px;
				background: #171c2b;
				color: #f7f1e4;
				font-family: "IBM Plex Mono", "Cascadia Code", monospace;
				font-size: 15px;
				line-height: 1.6;
				white-space: pre-wrap;
				word-break: break-word;
				overflow-wrap: anywhere;
				box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
			}

			.hint {
				margin-top: 14px;
				font-size: 13px;
			}

			.hint code {
				padding: 2px 6px;
				border-radius: 999px;
				background: rgba(24, 32, 51, 0.08);
				color: var(--ink);
				font-family: "IBM Plex Mono", "Cascadia Code", monospace;
			}

			@keyframes pulse {
				0%,
				100% {
					transform: scale(1);
					opacity: 1;
				}

				70% {
					transform: scale(1.2);
					opacity: 0.7;
				}
			}

			@media (max-width: 640px) {
				main {
					width: min(100vw - 16px, 980px);
					margin: 16px auto 24px;
				}

				.hero,
				.output {
					border-radius: 20px;
					padding: 18px;
				}

				pre {
					min-height: 260px;
					padding: 16px;
				}
			}
		</style>
	</head>
	<body>
		<main>
			<section class="hero">
				<div class="label" id="statusBadge">
					<span class="dot"></span>
					<span id="statusText">Connecting</span>
				</div>
				<h1>Manual LLM Stream</h1>
				<p>
					This page listens to server-sent events from the local demo server. Each line you
					type in the terminal becomes one streamed chunk on this page.
				</p>
				<div class="meta">
					<div class="card">
						<span class="name">Chunks</span>
						<span class="value" id="chunkCount">0</span>
					</div>
					<div class="card">
						<span class="name">Connection</span>
						<span class="value" id="connectionState">Waiting</span>
					</div>
				</div>
			</section>

			<section class="output">
				<pre id="stream"></pre>
				<p class="hint">
					Terminal commands:
					<code>/reset</code>
					<code>/done</code>
					<code>/exit</code>
					<code>/help</code>
				</p>
			</section>
		</main>

		<script>
			const stream = document.querySelector("#stream");
			const chunkCount = document.querySelector("#chunkCount");
			const connectionState = document.querySelector("#connectionState");
			const statusBadge = document.querySelector("#statusBadge");
			const statusText = document.querySelector("#statusText");

			function updateStatus(text, tone) {
				statusText.textContent = text;
				connectionState.textContent = text;

				if (tone === "ok") {
					statusBadge.style.color = "var(--ok)";
					return;
				}

				if (tone === "warn") {
					statusBadge.style.color = "var(--warn)";
					return;
				}

				statusBadge.style.color = "var(--accent)";
			}

			function setTranscript(text) {
				stream.textContent = text;
			}

			function setChunkCount(value) {
				chunkCount.textContent = String(value);
			}

			const events = new EventSource("/events");

			events.addEventListener("open", () => {
				updateStatus("Connected", "ok");
			});

			events.addEventListener("snapshot", (event) => {
				const payload = JSON.parse(event.data);
				setTranscript(payload.transcript);
				setChunkCount(payload.chunkCount);
			});

			events.addEventListener("chunk", (event) => {
				const payload = JSON.parse(event.data);
				setTranscript(payload.transcript);
				setChunkCount(payload.chunkCount);
				window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
			});

			events.addEventListener("reset", () => {
				setTranscript("");
				setChunkCount(0);
				updateStatus("Reset", "warn");
				window.setTimeout(() => updateStatus("Connected", "ok"), 1000);
			});

			events.addEventListener("done", () => {
				updateStatus("Done", "warn");
			});

			events.onerror = () => {
				updateStatus("Disconnected", "warn");
			};
		</script>
	</body>
</html>
